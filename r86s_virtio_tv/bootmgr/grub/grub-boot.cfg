menuentry "@BOOTMGR_ANDROID_DISTRIBUTION_NAME@ ${kernel_version_display} (R86S top-level entry; Intel Skylake and later GPU passthrough, Mesa graphics)" --id android-r86s_virtio_tv-top-intelskylakeandlater_mesa {
	pre_boot_hook
	set_android_default "android-r86s_virtio_tv-top-intelskylakeandlater_mesa"
	echo 'Loading kernel...'
	linux ${boot_partition}/kernel $kernel_cmdline_boot $kernel_cmdline_dynamic virtio_gpu.modeset=0 androidboot.gpu=intel androidboot.graphics=mesa androidboot.hardware_vulkan=intel
	echo 'Loading ramdisk...'
	initrd ${boot_partition}/${boot_ramdisk_filename}
}

